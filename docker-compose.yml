services:
  Main_DB:
    image: postgres:latest
    container_name: Storefront_Backend_DB
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports: 
      - "${DB_PORT}:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql

  Test_DB:
    image: postgres:latest
    container_name: Storefront_Backend_Test_DB
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_TEST_NAME}

    ports: 
      - "${DB_TEST_PORT}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql

volumes:
  postgres_main_data:
  postgres_test_data: